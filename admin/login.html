<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novique Admin - Login</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #D4AF37; --charcoal: #1A1A1A; --ivory: #F9F6F2; }
    body { background-color: var(--charcoal); color: var(--ivory); font-family: 'Nunito Sans', sans-serif; }
    .font-heading { font-family: 'Cormorant Garamond', serif; }
    .admin-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.1); backdrop-filter: blur(10px); }
    .btn-gold { background: linear-gradient(135deg, #D4AF37, #F5E6B3); color: #1A1A1A; transition: all 0.3s ease; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
    input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(212,175,55,0.2) !important; color: white !important; }
    input:focus { border-color: var(--gold) !important; outline: none; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center px-6">
  <div class="max-w-md w-full admin-card p-10 rounded-3xl text-center">
    <h1 class="font-heading text-4xl mb-2" style="color: var(--gold);">Novique Admin</h1>
    <p class="text-sm opacity-60 mb-8">Secure Access Portal</p>
    <form id="login-form" class="space-y-4 text-left">
      <div>
        <label class="text-[10px] uppercase tracking-widest opacity-40 ml-1 mb-1 block">Email Address</label>
        <input type="email" id="login-email" placeholder="admin@novique.com" class="w-full px-4 py-3 rounded-xl" required>
      </div>
      <div>
        <label class="text-[10px] uppercase tracking-widest opacity-40 ml-1 mb-1 block">Password</label>
        <input type="password" id="login-password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl" required>
      </div>
      <button type="submit" class="w-full btn-gold py-3 rounded-xl font-bold mt-6">Login to Dashboard</button>
    </form>
    <p id="login-error" class="text-red-400 text-xs mt-4 hidden">Invalid credentials. Please try again.</p>
  </div>

  <script type="module">
    import { auth } from '../firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'dashboard.html';
    });

    const loginForm = document.getElementById('login-form');
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const pass = document.getElementById('login-password').value;
      try {
        await signInWithEmailAndPassword(auth, email, pass);
        window.location.href = 'dashboard.html';
      } catch (err) {
        document.getElementById('login-error').classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
