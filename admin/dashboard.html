<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novique Admin - Dashboard</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --gold: #D4AF37; --charcoal: #1A1A1A; --ivory: #F9F6F2; }
    body { background-color: var(--charcoal); color: var(--ivory); font-family: 'Nunito Sans', sans-serif; }
    .font-heading { font-family: 'Cormorant Garamond', serif; }
    .admin-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(212,175,55,0.1); backdrop-filter: blur(10px); }
    .btn-gold { background: linear-gradient(135deg, #D4AF37, #F5E6B3); color: #1A1A1A; transition: all 0.3s ease; }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
    input, textarea, select { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(212,175,55,0.2) !important; color: white !important; }
    input:focus { border-color: var(--gold) !important; outline: none; box-shadow: 0 0 0 2px rgba(212,175,55,0.2); }
    .tab-btn { border-bottom: 2px solid transparent; transition: all 0.3s; }
    .tab-btn.active { border-color: var(--gold); color: var(--gold); }
  </style>
</head>
<body class="min-h-screen">
  <div id="dashboard">
    <!-- Sidebar / Nav -->
    <nav class="border-b border-white/5 py-4 px-8 flex justify-between items-center sticky top-0 bg-[#1A1A1A]/80 backdrop-blur-xl z-40">
      <div class="flex items-center gap-4">
        <h2 class="font-heading text-2xl" style="color: var(--gold);">Novique Admin</h2>
      </div>
      <div class="flex gap-4">
        <button id="logout-btn" class="text-sm opacity-50 hover:opacity-100 transition">Logout</button>
      </div>
    </nav>

    <div class="max-w-7xl mx-auto px-8 py-10">
      <!-- Tabs -->
      <div class="flex gap-8 mb-10 border-b border-white/5">
        <button class="tab-btn active px-4 py-2 text-sm font-semibold" data-tab="inquiries">Inquiries</button>
        <button class="tab-btn px-4 py-2 text-sm font-semibold" data-tab="portfolio">Portfolio</button>
        <button class="tab-btn px-4 py-2 text-sm font-semibold" data-tab="services">Services</button>
      </div>

      <!-- Inquiries Tab -->
      <div id="tab-inquiries" class="tab-content">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-heading">Event Inquiries</h3>
          <span id="inquiry-count" class="text-xs px-2 py-1 rounded bg-gold/20 text-gold">0 Total</span>
        </div>
        <div id="inquiry-list" class="grid gap-4">
          <div class="animate-pulse admin-card p-6 rounded-2xl h-32"></div>
        </div>
      </div>

      <!-- Portfolio Tab -->
      <div id="tab-portfolio" class="tab-content hidden">
         <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-heading">Portfolio Management</h3>
          <button onclick="toggleModal('portfolio-modal')" class="btn-gold px-6 py-2 rounded-full text-xs font-bold">+ Add Project</button>
        </div>
        <div id="portfolio-list" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>

      <!-- Services Tab -->
      <div id="tab-services" class="tab-content hidden">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-heading">Our Services</h3>
          <button onclick="toggleModal('service-modal')" class="btn-gold px-6 py-2 rounded-full text-xs font-bold">+ Add Service</button>
        </div>
        <div id="services-list" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </div>
    </div>
  </div>

  <!-- Portals/Modals -->
  <div id="portfolio-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 px-6 hidden">
    <div class="max-w-2xl w-full admin-card p-10 rounded-3xl">
      <h3 class="font-heading text-3xl mb-6">Add Portfolio Item</h3>
      <form id="portfolio-form" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="p-title" placeholder="Project Title" class="w-full px-4 py-2 rounded-lg" required>
          <select id="p-cat" class="w-full px-4 py-2 rounded-lg" required>
            <option value="weddings">Wedding</option>
            <option value="corporate">Corporate</option>
            <option value="engagements">Engagement</option>
            <option value="haldi">Haldi / Mehendi</option>
            <option value="luxury">Luxury Setup</option>
          </select>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="p-color" placeholder="Accent Color (e.g. #D4AF37)" class="w-full px-4 py-2 rounded-lg">
          <select id="p-height" class="w-full px-4 py-2 rounded-lg">
            <option value="h-44">Small (h-44)</option>
            <option value="h-48">Medium (h-48)</option>
            <option value="h-52">Tall (h-52)</option>
            <option value="h-56">Large (h-56)</option>
          </select>
        </div>
        <input type="number" id="p-order" placeholder="Display Order" class="w-full px-4 py-2 rounded-lg">
        <div class="flex justify-end gap-3 mt-8">
          <button type="button" onclick="toggleModal('portfolio-modal')" class="px-6 py-2 rounded-full border border-white/20 text-xs">Cancel</button>
          <button type="submit" class="btn-gold px-8 py-2 rounded-full text-xs font-bold">Save Item</button>
        </div>
      </form>
    </div>
  </div>

  <div id="service-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 px-6 hidden">
    <div class="max-w-2xl w-full admin-card p-10 rounded-3xl">
      <h3 class="font-heading text-3xl mb-6">Add Service</h3>
      <form id="service-form" class="space-y-4">
        <input type="text" id="s-name" placeholder="Service Name" class="w-full px-4 py-2 rounded-lg" required>
        <textarea id="s-desc" placeholder="Description" rows="3" class="w-full px-4 py-2 rounded-lg resize-none" required></textarea>
        <div class="grid grid-cols-2 gap-4">
          <input type="text" id="s-icon" placeholder="Lucide Icon Name" class="w-full px-4 py-2 rounded-lg">
          <input type="text" id="s-gradient" placeholder="CSS Gradient String" class="w-full px-4 py-2 rounded-lg">
        </div>
        <input type="number" id="s-order" placeholder="Display Order" class="w-full px-4 py-2 rounded-lg">
        <div class="flex justify-end gap-3 mt-8">
          <button type="button" onclick="toggleModal('service-modal')" class="px-6 py-2 rounded-full border border-white/20 text-xs">Cancel</button>
          <button type="submit" class="btn-gold px-8 py-2 rounded-full text-xs font-bold">Save Service</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { auth, db } from '../firebase-config.js';
    import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { collection, query, orderBy, onSnapshot, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Auth Guard
    onAuthStateChanged(auth, user => {
      if (!user) window.location.href = 'login.html';
      else initDashboard();
    });

    document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

    // Tabs logic
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        btn.classList.add('active');
        document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
      });
    });

    window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');

    function initDashboard() {
        // Inquiries listener
        onSnapshot(query(collection(db, "inquiries"), orderBy("created_at", "desc")), snap => {
            const list = document.getElementById('inquiry-list');
            document.getElementById('inquiry-count').textContent = `${snap.size} Total`;
            list.innerHTML = snap.docs.map(d => {
                const data = d.data();
                return `
                    <div class="admin-card p-6 rounded-2xl flex justify-between items-start">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h4 class="font-bold">${data.name}</h4>
                                <span class="text-[10px] px-2 py-0.5 rounded-full bg-gold/10 text-gold uppercase">${data.event_type}</span>
                            </div>
                            <p class="text-xs opacity-60 mb-3">${data.phone_number} | ${data.event_date}</p>
                            <p class="text-sm italic">"${data.message}"</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] opacity-30 mb-2">${data.created_at?.toDate().toLocaleDateString()}</p>
                            <button onclick="updateStatus('${d.id}', '${data.status === 'new' ? 'contacted' : 'booked'}')" class="text-[10px] border border-gold/30 px-3 py-1 rounded-full text-gold hover:bg-gold hover:text-charcoal transition capitalize">${data.status}</button>
                            <button onclick="deleteItem('inquiries', '${d.id}')" class="text-[10px] opacity-30 hover:text-red-400 ml-2">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        });

        // Portfolio listener
        onSnapshot(query(collection(db, "portfolio"), orderBy("order", "asc")), snap => {
            const list = document.getElementById('portfolio-list');
            list.innerHTML = snap.docs.map(d => {
                const data = d.data();
                return `
                    <div class="admin-card p-4 rounded-xl">
                        <div class="h-32 rounded-lg flex items-center justify-center mb-4" style="background: linear-gradient(135deg, ${data.color}33, ${data.color}11); border: 1px solid ${data.color}20;">
                            <span class="text-xs opacity-40">${data.title}</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <div>
                                <h5 class="text-sm font-bold">${data.title}</h5>
                                <p class="text-[10px] opacity-50 uppercase">${data.cat}</p>
                            </div>
                            <button onclick="deleteItem('portfolio', '${d.id}')" class="p-2 opacity-30 hover:text-red-400 transition"> <i data-lucide="trash-2" class="w-4 h-4"></i> </button>
                        </div>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        });

        // Services listener
        onSnapshot(query(collection(db, "services"), orderBy("order", "asc")), snap => {
            const list = document.getElementById('services-list');
            list.innerHTML = snap.docs.map(d => {
                const data = d.data();
                return `
                    <div class="admin-card p-6 rounded-xl">
                        <div class="flex justify-between mb-4">
                            <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background: ${data.gradient};">
                                <i data-lucide="${data.icon}" class="w-5 h-5"></i>
                            </div>
                            <button onclick="deleteItem('services', '${d.id}')" class="opacity-30 hover:text-red-400"> <i data-lucide="trash-2" class="w-4 h-4"></i> </button>
                        </div>
                        <h5 class="font-bold mb-1">${data.name}</h5>
                        <p class="text-xs opacity-50 line-clamp-2">${data.desc}</p>
                    </div>
                `;
            }).join('');
            lucide.createIcons();
        });
    }

    // Global actions
    window.deleteItem = async (col, id) => {
        if (confirm('Are you sure you want to delete this?')) {
            await deleteDoc(doc(db, col, id));
        }
    };
    window.updateStatus = async (id, status) => {
        await updateDoc(doc(db, "inquiries", id), { status });
    };

    document.getElementById('portfolio-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            title: document.getElementById('p-title').value,
            cat: document.getElementById('p-cat').value,
            color: document.getElementById('p-color').value || '#D4AF37',
            height: document.getElementById('p-height').value,
            order: parseInt(document.getElementById('p-order').value) || 99
        };
        await addDoc(collection(db, "portfolio"), data);
        toggleModal('portfolio-modal');
        e.target.reset();
    });

    document.getElementById('service-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            name: document.getElementById('s-name').value,
            desc: document.getElementById('s-desc').value,
            icon: document.getElementById('s-icon').value || 'sparkles',
            gradient: document.getElementById('s-gradient').value || 'linear-gradient(135deg, rgba(212,175,55,0.1), transparent)',
            order: parseInt(document.getElementById('s-order').value) || 99
        };
        await addDoc(collection(db, "services"), data);
        toggleModal('service-modal');
        e.target.reset();
    });

    lucide.createIcons();
  </script>
</body>
</html>
